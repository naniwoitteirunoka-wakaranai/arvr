<!doctype html>
<html>
<head>
<title>A-Frame Geolocation</title>

<script src="/aframe.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
function showShapes(position)
 {
var currentLatitude = position.coords.latitude;
var currentLongitude = position.coords.longitude;
console.log("Latitude= " + currentLatitude);
console.log("Longitude= " + currentLongitude);
document.getElementById('currentLocation').innerHTML =
  `Lat: ${currentLatitude}<br>Lon: ${currentLongitude}`;

var locations = [
{ id: "box", lat:12.9564672,lon:77.6208384, threshold: 0.005 },
{ id: "cylinder", lat: 12.976237787634481, lon: 77.50416104820695, threshold: 0.005 },
{ id: "sphere", lat: 12.9564672,lon: 77.594624,threshold: 0.005}
];
locations.forEach(location => {
var shape = document.querySelector(`#${location.id}`);
if (shape && Math.abs(currentLatitude - location.lat) < location.threshold &&
Math.abs(currentLongitude - location.lon) < location.threshold) {
shape.setAttribute('visible', true);
}
});
}
function locationError(error) {
console.error("Error getting location: ", error);
document.getElementById('currentLocation').innerHTML =
`Error getting location: ${error.message}`;
}
function getLocation() {
if (navigator.geolocation) {
navigator.geolocation.getCurrentPosition(showShapes, locationError, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
} else {
document.getElementById('currentLocation').innerHTML =
"Geolocation is not supported by this browser.";
}
}
getLocation();
});</script>
</head>
<body style="background-color: black;"><h3 style="color: white;"
    id="currentLocation">Fetching location...</h3>
<a-scene><a-box id="box" position="0 0.5 -3" rotation="0 45 0" color="red" visible="false"></a-box>
<a-cylinder id="cylinder" position="2 0.5 -3" radius="0.5" height="1.5" color="#05767a" visible="false"></a-cylinder>
<a-sphere id="sphere" position="-2 0.75 -3" radius="0.75" color="green" visible="false"></a-sphere>
<a-camera gps-camera rotation-reader></a-camera>
</a-scene>
</body>
</html>
