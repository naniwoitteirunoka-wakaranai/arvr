<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Geranium AR</title>

  <script src="aframe.min.js"></script>
  <script src="mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>

</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: hange.mind;"
  vr-mode-ui="false"
  device-orientation-permission-ui="false"
>

  <!-- Load Model -->
  <a-assets>
    <a-asset-item 
      id="geranium"
      src="model/geranium_flower.glb">
    </a-asset-item>
  </a-assets>

  <!-- Camera -->
  <a-camera position="0 0 0" look-controls="false"></a-camera>

  <!-- Marker Target -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- 3D Model -->
    <a-entity
      gltf-model="#geranium"
      position="0 0 0"
      rotation="0 0 0"
      scale="0.5 0.5 0.5">
    </a-entity>

  </a-entity>

</a-scene>

</body>
</html>
