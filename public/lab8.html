<!DOCTYPE html>
<html>
<head>
  <title>A-Frame AR Marker</title>

  <!-- Local A-Frame -->
  <script src="aframe.min.js"></script>

  <!-- Local AR.js for A-Frame -->
  <script src="aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

    <!-- Marker -->
    <a-marker type="pattern" url="pattern-kanji.patt">
      <a-box position="0 0.5 0" color="white"></a-box>
      <a-cone color="cyan" height="1" radius="0.1" position="1 0.5 0"></a-cone>
    </a-marker>

    <!-- Camera -->
    <a-camera></a-camera>

  </a-scene>
</body>
</html>
